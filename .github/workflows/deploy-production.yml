# =============================================================================
# 工作流：部署到 Cloudflare Workers 生产环境
# 触发条件：手动触发 (workflow_dispatch) — 仅由用户手动执行
#
# ⚠️ 重要：此工作流不会自动触发！
#    请在预览环境测试无误后，前往 GitHub Actions 页面手动运行。
# =============================================================================

name: Deploy to Production (Cloudflare Workers)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '确认部署到生产环境？输入 "yes" 确认'
        required: true
        default: 'no'

jobs:
  confirm:
    name: Confirm Production Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        shell: bash
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "yes" ]; then
            echo "❌ 部署已取消：请输入 'yes' 确认部署到生产环境。"
            exit 1
          fi
          echo "✅ 生产部署已确认。"

  check-secrets:
    name: Check Required Secrets
    needs: confirm
    runs-on: ubuntu-latest
    outputs:
      secrets_ok: ${{ steps.check.outputs.secrets_ok }}
    steps:
      - name: Check all required secrets
        id: check
        shell: bash
        run: |
          MISSING=""
          if [ -z "${{ secrets.CF_API_TOKEN }}" ]; then MISSING="$MISSING CF_API_TOKEN"; fi
          if [ -z "${{ secrets.CF_ACCOUNT_ID }}" ]; then MISSING="$MISSING CF_ACCOUNT_ID"; fi
          if [ -z "${{ secrets.R2_ACCESS_KEY_ID }}" ]; then MISSING="$MISSING R2_ACCESS_KEY_ID"; fi
          if [ -z "${{ secrets.R2_SECRET_ACCESS_KEY }}" ]; then MISSING="$MISSING R2_SECRET_ACCESS_KEY"; fi
          if [ -z "${{ secrets.D1_DATABASE_ID }}" ]; then MISSING="$MISSING D1_DATABASE_ID"; fi
          if [ -z "${{ secrets.D1_DATABASE_NAME }}" ]; then MISSING="$MISSING D1_DATABASE_NAME"; fi
          if [ -z "${{ secrets.KV_NAMESPACE_ID }}" ]; then MISSING="$MISSING KV_NAMESPACE_ID"; fi
          if [ -z "${{ secrets.R2_BUCKET_NAME }}" ]; then MISSING="$MISSING R2_BUCKET_NAME"; fi

          if [ -n "$MISSING" ]; then
            echo "❌ Error: The following required secrets are not set:"
            for var in $MISSING; do
              echo "   Error: $var is not set."
            done
            echo "secrets_ok=false" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "✅ All required secrets are set."
            echo "secrets_ok=true" >> $GITHUB_OUTPUT
          fi

  deploy-production:
    name: Deploy to Workers Production
    needs: [check-secrets, confirm]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Inject resource IDs into wrangler.toml
        shell: bash
        run: |
          sed -i "s|__D1_ID__|${{ secrets.D1_DATABASE_ID }}|g" wrangler.toml
          sed -i "s|__D1_NAME__|${{ secrets.D1_DATABASE_NAME }}|g" wrangler.toml
          sed -i "s|__KV_ID__|${{ secrets.KV_NAMESPACE_ID }}|g" wrangler.toml
          sed -i "s|__R2_BUCKET__|${{ secrets.R2_BUCKET_NAME }}|g" wrangler.toml
          echo "✅ wrangler.toml IDs injected"

      - name: Deploy to Cloudflare Workers (Production)
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy
          secrets: |
            R2_ACCESS_KEY_ID
            R2_SECRET_ACCESS_KEY
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

  smoke-test:
    name: Smoke Test (Production)
    needs: deploy-production
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment
        run: sleep 20

      - name: Smoke test - check production Worker returns 200
        shell: bash
        run: |
          WORKER_URL="https://outlook-email-plus.${{ secrets.CF_ACCOUNT_ID }}.workers.dev"
          echo "Smoke testing production: $WORKER_URL/healthz"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$WORKER_URL/healthz" || echo "000")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Production smoke test failed: got HTTP $HTTP_STATUS"
            curl -s --max-time 30 "$WORKER_URL/healthz" || true
            exit 1
          fi
          echo "✅ Production smoke test passed: HTTP $HTTP_STATUS"
          echo ""
          echo "🎉 生产环境部署成功！"
          echo "    Worker URL: $WORKER_URL"
