# =============================================================================
# 工作流：部署到 Cloudflare Workers 预览环境
# 触发条件：推送到 main/master 分支或 PR 时自动触发
# 目标环境：wrangler --env preview
# =============================================================================

name: Deploy to Preview (Cloudflare Workers)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check-secrets:
    name: Check Required Secrets
    runs-on: ubuntu-latest
    outputs:
      secrets_ok: ${{ steps.check.outputs.secrets_ok }}
    steps:
      - name: Check all required secrets
        id: check
        shell: bash
        run: |
          MISSING=""
          # 必需的 Secrets 列表
          if [ -z "${{ secrets.CF_API_TOKEN }}" ]; then MISSING="$MISSING CF_API_TOKEN"; fi
          if [ -z "${{ secrets.CF_ACCOUNT_ID }}" ]; then MISSING="$MISSING CF_ACCOUNT_ID"; fi
          if [ -z "${{ secrets.R2_ACCESS_KEY_ID }}" ]; then MISSING="$MISSING R2_ACCESS_KEY_ID"; fi
          if [ -z "${{ secrets.R2_SECRET_ACCESS_KEY }}" ]; then MISSING="$MISSING R2_SECRET_ACCESS_KEY"; fi
          if [ -z "${{ secrets.D1_DATABASE_ID }}" ]; then MISSING="$MISSING D1_DATABASE_ID"; fi
          if [ -z "${{ secrets.D1_DATABASE_NAME }}" ]; then MISSING="$MISSING D1_DATABASE_NAME"; fi
          if [ -z "${{ secrets.KV_NAMESPACE_ID }}" ]; then MISSING="$MISSING KV_NAMESPACE_ID"; fi
          if [ -z "${{ secrets.KV_BINDING_NAME }}" ]; then MISSING="$MISSING KV_BINDING_NAME"; fi
          if [ -z "${{ secrets.R2_BUCKET_NAME }}" ]; then MISSING="$MISSING R2_BUCKET_NAME"; fi

          if [ -n "$MISSING" ]; then
            echo "❌ Error: The following required secrets are not set:"
            for var in $MISSING; do
              echo "   Error: $var is not set."
            done
            echo "secrets_ok=false" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "✅ All required secrets are set."
            echo "secrets_ok=true" >> $GITHUB_OUTPUT
          fi

  test:
    name: Run Tests
    needs: check-secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run browser extension tests
        run: npm run test:browser-extension || echo "Browser extension tests not configured"

      - name: Validate wrangler.toml
        run: npx wrangler --version

  deploy-preview:
    name: Deploy to Workers Preview
    needs: [check-secrets, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Inject resource IDs into wrangler.toml
        shell: bash
        run: |
          sed -i "s|__D1_ID__|${{ secrets.D1_DATABASE_ID }}|g" wrangler.toml
          sed -i "s|__D1_NAME__|${{ secrets.D1_DATABASE_NAME }}|g" wrangler.toml
          sed -i "s|__KV_ID__|${{ secrets.KV_NAMESPACE_ID }}|g" wrangler.toml
          sed -i "s|__KV_BINDING__|${{ secrets.KV_BINDING_NAME }}|g" wrangler.toml
          sed -i "s|__R2_BUCKET__|${{ secrets.R2_BUCKET_NAME }}|g" wrangler.toml
          echo "✅ wrangler.toml IDs injected"

      - name: Check wrangler.toml after injection
        shell: bash
        run: |
          echo "=== wrangler.toml (IDs masked) ==="
          sed 's/[0-9a-f]\{8\}-[0-9a-f]\{4\}-[0-9a-f]\{4\}-[0-9a-f]\{4\}-[0-9a-f]\{12\}/***MASKED***/g' wrangler.toml

      - name: Upload secrets and deploy
        id: deploy
        shell: bash
        run: |
          echo "=== Uploading secrets ==="
          echo "${{ secrets.R2_ACCESS_KEY_ID }}" | npx wrangler secret put R2_ACCESS_KEY_ID 2>&1 || echo "Note: secret may already exist"
          echo "${{ secrets.R2_SECRET_ACCESS_KEY }}" | npx wrangler secret put R2_SECRET_ACCESS_KEY 2>&1 || echo "Note: secret may already exist"

          echo ""
          echo "=== Running: npx wrangler deploy ==="
          set +e
          DEPLOY_OUTPUT=$(npx wrangler deploy 2>&1)
          EXIT_CODE=$?
          set -e
          echo "$DEPLOY_OUTPUT"
          echo "=== Exit code: $EXIT_CODE ==="

          if [ "$EXIT_CODE" != "0" ]; then
            echo "❌ wrangler deploy failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi

          # 从输出中提取 Worker URL
          WORKER_URL=$(echo "$DEPLOY_OUTPUT" | grep -oP 'https://[a-zA-Z0-9.-]+\.workers\.dev' | head -1)
          if [ -n "$WORKER_URL" ]; then
            echo "deployment_url=$WORKER_URL" >> $GITHUB_OUTPUT
            echo "✅ Captured Worker URL: $WORKER_URL"
          else
            echo "⚠️ Could not extract Worker URL from output"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Smoke test with retry
        shell: bash
        run: |
          WORKER_URL="${{ steps.deploy.outputs.deployment_url }}"
          echo "Deployment URL from wrangler: '$WORKER_URL'"
          if [ -z "$WORKER_URL" ]; then
            echo "⚠️ No URL from wrangler, checking workers.dev..."
            WORKER_URL="https://outlook-email-plus.${{ secrets.CF_ACCOUNT_ID }}.workers.dev"
          fi
          echo "Smoke testing: $WORKER_URL/healthz"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            --retry 5 \
            --retry-delay 10 \
            --retry-connrefused \
            "$WORKER_URL/healthz" || echo "000")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Smoke test failed: got HTTP $HTTP_STATUS"
            echo "Checking worker routes..."
            curl -s --max-time 30 "$WORKER_URL/healthz" || true
            curl -s --max-time 30 "$WORKER_URL/" || true
            echo ""
            echo "=== Checking workers.dev subdomain ==="
            npx wrangler list 2>&1 | grep -i "outlook-email-plus" || true
            exit 1
          fi
          echo "✅ Smoke test passed: HTTP $HTTP_STATUS"
