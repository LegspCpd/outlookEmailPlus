# =============================================================================
# Cloudflare Wrangler 配置 — Outlook Email Plus
# =============================================================================
# 目标平台: Cloudflare Workers (非 Pages)
# 存储方案: D1 (数据库) + Workers KV (会话/缓存) + R2 (静态资源/文件)
#
# CI 会在部署前用 sed 将占位符替换为 GitHub Secrets 中的真实 ID。
# 占位符含义:
#   __D1_ID__           → D1 数据库 ID
#   __D1_NAME__         → D1 数据库名称
#   __KV_ID__           → KV 命名空间 ID
#   __KV_BINDING__      → KV 绑定变量名（默认 SESSION_KV）
#   __R2_BUCKET__       → R2 存储桶名称
# =============================================================================

name = "outlook-email-plus"
main = "src/index.js"
compatibility_date = "2024-12-01"

workers_dev = true

# =============================================================================
# D1 数据库绑定
# =============================================================================
[[d1_databases]]
binding = "DB"
database_name = "__D1_NAME__"
database_id = "__D1_ID__"

# =============================================================================
# Workers KV 绑定
# =============================================================================
[[kv_namespaces]]
binding = "__KV_BINDING__"
id = "__KV_ID__"

# =============================================================================
# R2 存储桶绑定
# =============================================================================
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "__R2_BUCKET__"

# =============================================================================
# 环境变量
# =============================================================================
[vars]
APP_VERSION = "2.7.0"
OAUTH_TOOL_ENABLED = "true"
